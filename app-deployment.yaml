apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hr-app
  template:
    metadata:
      labels:
        app: hr-app
    spec:
      containers:
      - name: hr-app
        image: rishabhmishra01/hr-app-management-system-main-app:latest
        ports:
        - containerPort: 3000
       env:
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: hr-app-config
              key: MONGO_URI
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: hr-app-config
              key: DB_NAME
---
apiVersion: v1
kind: Service
metadata:
  name: hr-service
spec:
  selector:
    app: hr-app
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
